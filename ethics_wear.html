   .product_container{
     display:flex;
     flex-wrap:wrap;

   .product{
      display: flex;
      flex-direction: column; /* Stack image and text vertically */
      width: 100%;
      max-width: 220px;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);

   /* The Modal Background */
.product_details {
  display: none; /* Hidden by default */
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 50px;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
}

/* Modal Content Box */
.modal-content {
  background-color: #fff;
  margin: 5% auto;
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 700px;
  height:80%;
  text-align: center;
  animation: slideIn 0.3s ease-out;
}
.modal-content img{
  width:80%;
  height:700px;
  top:50px;
}

/* Close Button */
.modal-content span {
  position:relative;
  right: 20px;
  font-size: 50px;
  cursor: pointer;
  color: #aaa;
}

.modal-content span:hover {
  color: #000;
}

/* Animation for the popup */
@keyframes slideIn {
  from { transform: translateY(-50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
   </style>
